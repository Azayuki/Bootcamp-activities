<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div class="flex h-screen items-center justify-center bg-gray-100 flex-col gap-4 overflow-hidden">
      <div class="flex align-center justify-evenly p-4 shadow-md w-full bg-[#aac117]">
        <h1 class="text-3xl text-white font-bold">
            Pokedex
        </h1>
        <button id="toggleShowForm" class="bg-blue-300 text-white rounded-lg hover:bg-blue-600">
          Show Form
        </button>
      </div>
      <div id="pokemonForm" class="flex flex-1 flex-col hidden">
        <h1 class="text-2xl font-bold">Add a new Pokemon</h1>
        <form id="pokemonCreateForm" action="" class="flex flex-col gap-2 ">
          <label for="pokedexNumber" class="font-bold">Pokedex Number</label>
          <input
            type="number"
            id="pokedexNumber"
            name="pokedexNumber"
            placeholder="Pokedex Number"
            class="border border-gray-300 rounded-lg p-2 bg-gray-100"
            >
          <label for="pokemonName" class="font-bold">Pokemon Name</label>
          <input
            type="text"
            id="pokemonName"
            name="pokemonName"
            placeholder="Pokemon Name"
            class="border border-gray-300 rounded-lg p-2 mt-2 bg-gray-100"
            >
          <label for="pokemonType" class="font-bold">Pokemon Type</label>
          <input type="text"
            id="pokemonType"
            name="pokemonType"
            placeholder="Pokemon Type"
            class="border border-gray-300 rounded-lg p-2 mt-2 bg-gray-100">

          <input
            type="submit"
            value="Add Pokemon"
            class="bg-green-500 text-white rounded-lg p-2 mt-4 hover:bg-green-600 cursor-pointer"
            value="Submit"
            >
        </form>
      </div>
      <div class="flex flex-3 flex-col overflow-y-auto">
        <h1 class="text-2xl font-bold text-center">Pokemon Lists</h1>
        <div id="pokemonContainer" class="flex flex-wrap gap-4 mt-4">
        </div>
      </div>
      <div class="flex p-4 shadow-md w-full justify-center bg-[#aac117]">
        <h2 class="text-white text-2xl">
          Footer
        </h2>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
